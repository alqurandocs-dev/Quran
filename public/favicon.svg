<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#g)"/>
  <!-- Stylised "N" with a crescent-like cutout feel -->
  <!-- Left vertical bar -->
  <rect x="12" y="14" width="8" height="36" rx="3" fill="#0B1120"/>
  <!-- Diagonal stroke -->
  <polygon points="12,14 20,14 44,50 36,50" fill="#0B1120"/>
  <!-- Right vertical bar -->
  <rect x="36" y="14" width="8" height="36" rx="3" fill="#0B1120"/>
  <!-- Small teal dot accent (noor = light) -->
  <circle cx="50" cy="14" r="4.5" fill="#0B1120" opacity="0.35"/>
</svg>
